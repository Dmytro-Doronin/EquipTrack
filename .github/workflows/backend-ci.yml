name: Backend CI

on:
    pull_request:
        branches:
            - main
        paths:
            - 'server/**'
            - '.github/workflows/backend-ci.yml'

    push:
        branches:
            - main
        paths:
            - 'server/**'
            - '.github/workflows/backend-ci.yml'

jobs:
    backend-tests:
        name: Backend tests
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_USER: equiptrack
                    POSTGRES_PASSWORD: equiptrack_password
                    POSTGRES_DB: equiptrack_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd="pg_isready -U equiptrack -d equiptrack_test"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5

        defaults:
            run:
                working-directory: server

        env:
            POSTGRES_USER: equiptrack
            POSTGRES_PASSWORD: equiptrack_password
            POSTGRES_DB: equiptrack_test
            POSTGRES_HOST: localhost
            POSTGRES_PORT: '5432'

            MAIL_HOST: smtp.gmail.com
            MAIL_PORT: '587'
            MAIL_USERNAME: test@example.com
            MAIL_PASSWORD: test_mail_password
            MAIL_FROM: test@example.com
            MAIL_USE_TLS: 'true'
            MAIL_USE_SSL: 'false'

            AWS_ACCESS_KEY_ID: test_aws_access_key
            AWS_SECRET_ACCESS_KEY: test_aws_secret_key
            AWS_REGION: eu-north-1
            AWS_S3_BUCKET_NAME: equip-tracker-test
            AWS_S3_PUBLIC_URL: https://example.com

            JWT_SECRET_KEY: test_jwt_secret_key
            JWT_ALGORITHM: HS256
            ACCESS_TOKEN_EXPIRES_MINUTES: '15'
            REFRESH_TOKEN_EXPIRES_DAYS: '30'

            PASSWORD_RESET_TOKEN_SECRET: test_password_reset_secret
            PASSWORD_RESET_TOKEN_EXPIRES_MINUTES: '15'

            CLIENT_URL: http://localhost:3000
            GOOGLE_CLIENT_ID: test_google_client_id

            APP_ENV: test

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y gcc libpq-dev

            - name: Install Python dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install pytest pytest-asyncio httpx

            - name: Run migrations
              run: alembic upgrade head

            - name: Run tests
              run: pytest -q
